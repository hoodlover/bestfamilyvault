<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Family Vault</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: 340px;
        font: 13px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0c0a09;
        color: #e7e5e4;
      }
      .header {
        padding: 12px 14px;
        border-bottom: 1px solid #292524;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .header img { width: 28px; height: 28px; border-radius: 6px; }
      .header .titles { flex: 1; min-width: 0; }
      .header h1 { font-size: 14px; margin: 0; color: #fafaf9; }
      .header .sub { color: #a8a29e; font-size: 11px; margin-top: 2px; truncate: ellipsis; overflow: hidden; white-space: nowrap; }
      .body { padding: 12px 14px; }
      .empty { color: #78716c; font-size: 12px; padding: 16px 0; text-align: center; }
      .search {
        position: relative;
        margin-bottom: 8px;
      }
      .search input {
        width: 100%;
        padding: 7px 10px 7px 28px;
        border-radius: 8px;
        background: #1c1917;
        color: #fafaf9;
        border: 1px solid #44403c;
        font: inherit;
      }
      .search input:focus {
        outline: none;
        border-color: #10b981;
        box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
      }
      .search svg {
        position: absolute;
        left: 9px;
        top: 50%;
        transform: translateY(-50%);
        color: #78716c;
        pointer-events: none;
      }
      .section-label {
        text-transform: uppercase;
        font-size: 10px;
        letter-spacing: 0.06em;
        color: #78716c;
        font-weight: 600;
        padding: 8px 4px 4px;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 6px;
      }
      .row:hover { background: #1c1917; }
      .row .info { flex: 1; min-width: 0; cursor: pointer; }
      .row .title { font-weight: 600; color: #f5f5f4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .row .username { color: #a8a29e; font-size: 11px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .row .actions { display: flex; gap: 4px; opacity: 0; transition: opacity .12s; }
      .row:hover .actions { opacity: 1; }
      button.icon {
        background: transparent;
        border: 1px solid #44403c;
        color: #d6d3d1;
        padding: 4px 6px;
        border-radius: 5px;
        cursor: pointer;
        font: inherit;
        font-size: 11px;
        display: inline-flex;
        align-items: center;
        gap: 3px;
      }
      button.icon:hover { background: #292524; color: #fafaf9; border-color: #57534e; }
      button.icon.copied { background: #064e3b; color: #6ee7b7; border-color: #047857; }
      a { color: #34d399; }
      button.primary {
        background: #047857;
        border: none;
        color: white;
        padding: 7px 12px;
        border-radius: 6px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
      }
      button.primary:hover { background: #059669; }
      button.ghost {
        background: transparent;
        color: #a8a29e;
        border: 1px solid #44403c;
        padding: 6px 12px;
        border-radius: 6px;
        font: inherit;
        cursor: pointer;
      }
      button.ghost:hover { background: #1c1917; color: #e7e5e4; }
      button.ghost.danger:hover { background: #450a0a; color: #fca5a5; border-color: #7f1d1d; }
      .footer {
        padding: 10px 14px;
        border-top: 1px solid #292524;
        display: flex;
        justify-content: space-between;
        gap: 8px;
      }
      .err { color: #fca5a5; font-size: 11px; padding: 4px 0; }
      /* "No matches" fallback turns into quick-create shortcuts so the
         user doesn't dead-end on a fruitless search — one tap to start
         a new Password / Note / Entry over in the vault. */
      .create-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        justify-content: center;
        padding: 6px 0 4px;
      }
      .pill {
        background: #064e3b;
        color: #d1fae5;
        border: 1px solid #047857;
        border-radius: 999px;
        padding: 4px 10px;
        font: inherit;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .pill:hover { background: #047857; color: #ecfdf5; border-color: #10b981; }
      .pill .plus { color: #6ee7b7; font-size: 13px; line-height: 1; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/popup/popup.tsx"></script>
  </body>
</html>
