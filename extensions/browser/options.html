<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Family Vault — Settings</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font: 14px/1.5 system-ui, sans-serif;
        background: #0c0a09;
        color: #e7e5e4;
        padding: 32px 16px;
      }
      .container { max-width: 480px; margin: 0 auto; }
      h1 { font-size: 22px; margin: 0 0 8px; }
      h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em; color: #a8a29e; margin: 24px 0 12px; }
      label { display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: #a8a29e; margin-bottom: 4px; }
      input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        background: #1c1917;
        border: 1px solid #44403c;
        border-radius: 6px;
        color: #f5f5f4;
        font: inherit;
      }
      button {
        background: #047857;
        border: none;
        color: white;
        padding: 8px 14px;
        border-radius: 6px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { background: #059669; }
      button:disabled { background: #14532d; cursor: not-allowed; opacity: 0.6; }
      .err { color: #fca5a5; margin-top: 8px; font-size: 13px; }
      .ok { color: #6ee7b7; margin-top: 8px; font-size: 13px; }
      .row { display: flex; gap: 8px; align-items: end; }
      .row > .grow { flex: 1; }
      p.muted { color: #a8a29e; font-size: 13px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/options/options.tsx"></script>
  </body>
</html>
